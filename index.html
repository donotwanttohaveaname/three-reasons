<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>three reasons</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  :root{
    --bg:#070708;
    --phone:#0c0c0f;
    --header:#141418;
    --hairline:#222227;
    --me1:#7a34d6;
    --me2:#5a23a8;
    --him:#26262c;
    --himtx:#e9e9ef;
    --friend:#16604a;
    --friendtx:#d8f3e9;
    --muted:#84848f;
    --pill:#1a1a1f;
    --blood1:#5e0c16;
    --blood2:#8c0d1c;
    --blood3:#b3121f;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #161421 0%, #090909 55%, #050505 100%);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    user-select:none;
  }

  /* ---------------- phone ---------------- */
  #phone{
    position:relative;
    width:min(420px, 100vw);
    height:min(900px, 100vh);
    overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 0 0 1px rgba(0,0,0,.2), 0 30px 80px rgba(0,0,0,.6);
    /* ---------- palette (light Tinder default) ---------- */
    --bg:#ececec;
    --him-bg:#e5e5e7; --him-tx:#151515;
    --me-bg:#3a0a12; --me-tx:#ffffff;
    --friend-bg:#e5e5e7; --friend-tx:#151515;
    --head-bg:#f6f6f6; --head-tx:#151515; --sub-tx:#8c8c8c; --accent:#3a0a12;
    --input-bg:#ffffff; --input-tx:#151515; --ph-tx:#a2a2a2;
    --pill-bg:#e0e0e0; --pill-tx:#8c8c8c; --stamp-tx:#a2a2a2;
    background:var(--bg);
    transition:background 1s ease, box-shadow 1s ease;
  }
  @media (min-width:440px){
    #phone{border-radius:42px; height:min(880px,96vh); box-shadow:0 0 0 10px #000, 0 0 0 11px #2a2a30, 0 40px 120px rgba(0,0,0,.7);}
  }

  /* ================= palette evolution ================= */
  body.pal-bright #phone{ --bg:#ffe9f2; --him-bg:#ffd6e6; --him-tx:#3a0f22; --me-bg:#ff2f79; --me-tx:#fff; --friend-bg:#ffd6e6; --friend-tx:#3a0f22; --head-bg:#fff2f7; --head-tx:#4a1230; --sub-tx:#c98bab; --accent:#ff2f79; --input-bg:#fff; --input-tx:#3a0f22; --ph-tx:#d59db8; --pill-bg:#ffcfe2; --pill-tx:#bd6a8c; --stamp-tx:#cf9bb4; }
  body.pal-red #phone{ --bg:#ff4d4d; --him-bg:#ffd9d9; --him-tx:#4a0000; --me-bg:#b30000; --me-tx:#fff; --friend-bg:#ffd9d9; --friend-tx:#4a0000; --head-bg:#ff6b6b; --head-tx:#5a0000; --sub-tx:#7a1010; --accent:#b30000; --input-bg:#ffe2e2; --input-tx:#4a0000; --ph-tx:#c66; --pill-bg:#ff8f8f; --pill-tx:#7a1010; --stamp-tx:#8a1a1a; }
  body.pal-pink #phone{ --bg:#ffe1ee; --him-bg:#ffcfe0; --him-tx:#3a1224; --me-bg:#ff5c93; --me-tx:#fff; --friend-bg:#ffcfe0; --friend-tx:#3a1224; --head-bg:#ffe9f2; --head-tx:#4a1a30; --sub-tx:#c07a96; --accent:#ff5c93; --input-bg:#fff; --input-tx:#3a1224; --ph-tx:#d79ab4; --pill-bg:#ffd2e2; --pill-tx:#b6708c; --stamp-tx:#c98aa6; }
  body.pal-graypink #phone{ --bg:#d6cad0; --him-bg:#c9bcc4; --him-tx:#2c2228; --me-bg:#96687a; --me-tx:#f4eef1; --friend-bg:#c9bcc4; --friend-tx:#2c2228; --head-bg:#dcd0d6; --head-tx:#3a2e34; --sub-tx:#8a7a82; --accent:#96687a; --input-bg:#e5dce1; --input-tx:#2c2228; --ph-tx:#9a8a92; --pill-bg:#cabdc4; --pill-tx:#8a7a82; --stamp-tx:#9a8a92; }
  body.pal-superred #phone{ --bg:#5e0710; --him-bg:#3f0810; --him-tx:#ffdede; --me-bg:#e6101f; --me-tx:#fff; --friend-bg:#3f0810; --friend-tx:#ffdede; --head-bg:#4a0810; --head-tx:#ffd6d6; --sub-tx:#c97a7a; --accent:#ff2534; --input-bg:#2e0a0e; --input-tx:#ffdede; --ph-tx:#a55; --pill-bg:#4a0c12; --pill-tx:#cc8a8a; --stamp-tx:#cc7a7a; }
  body.pal-black #phone{ --bg:#060607; --him-bg:#1c1c20; --him-tx:#e9e9ef; --me-bg:#6a1526; --me-tx:#fff; --friend-bg:#16403a; --friend-tx:#dfeeea; --head-bg:#0f0f12; --head-tx:#f0f0f3; --sub-tx:#7a7a82; --accent:#7a1020; --input-bg:#141014; --input-tx:#e9e9ef; --ph-tx:#5d5d66; --pill-bg:#1a1a1f; --pill-tx:#8a8a92; --stamp-tx:#8a8a95; }
  body.pal-graysad #phone{ --bg:#d0d2d6; --him-bg:#c4c7cd; --him-tx:#2b2d31; --me-bg:#7c828d; --me-tx:#f2f3f5; --friend-bg:#c4c7cd; --friend-tx:#2b2d31; --head-bg:#d7d9dc; --head-tx:#3a3d42; --sub-tx:#888c92; --accent:#7c828d; --input-bg:#e3e4e7; --input-tx:#2b2d31; --ph-tx:#9a9da3; --pill-bg:#c8cace; --pill-tx:#888c92; --stamp-tx:#9a9da3; }

  /* ---- per-person identity: Him = blue, Friend = green ---- */
  #phone.who-him{ --identity:#161616; }
  #phone.who-friend{ --identity:#12a06a; }
  body.pal-endgray #phone{ --bg:#25262a; --him-bg:#34373c; --him-tx:#dcdce0; --me-bg:#4a4d53; --me-tx:#ececed; --friend-bg:#34373c; --friend-tx:#dcdce0; --head-bg:#202124; --head-tx:#d8d8dc; --sub-tx:#8a8d93; --accent:#5a5d63; --input-bg:#2a2b2f; --input-tx:#dcdce0; --ph-tx:#7a7d83; --pill-bg:#2f3033; --pill-tx:#8a8d93; --stamp-tx:#8a8d93; }

  /* status bar */
  #statusbar{
    height:34px; flex:0 0 34px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px; font-size:13px; font-weight:600; letter-spacing:.3px;
    color:var(--head-tx); z-index:6; position:relative; transition:color 1s ease;
  }
  #clock{font-variant-numeric:tabular-nums;}
  #statusbar .right{display:flex; gap:6px; align-items:center; opacity:.85;}
  #statusbar .bat{width:22px;height:11px;border:1px solid currentColor;border-radius:3px;position:relative;}
  #statusbar .bat::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:currentColor;border-radius:1px;}
  #statusbar .bat i{position:absolute;left:1px;top:1px;bottom:1px;width:70%;background:currentColor;border-radius:1px;display:block;}
  body.dying #statusbar .bat i{width:14%; background:#b3121f;}

  /* header */
  #header{
    flex:0 0 auto; z-index:5; position:relative;
    background:var(--head-bg);
    background:color-mix(in srgb, var(--head-bg) 80%, var(--identity, transparent) 20%);
    border-bottom:2px solid rgba(128,128,128,.25);
    border-bottom:2px solid color-mix(in srgb, var(--identity, #888) 60%, transparent);
    padding:6px 14px 10px;
    display:flex; align-items:center; gap:11px;
    transition:background 1s ease, border-color 1s ease;
  }
  #header .back{color:var(--accent); font-size:24px; line-height:1; width:14px; transition:color 1s ease;}
  #header .ava{
    width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,#3a3a44,#222);
    display:flex;align-items:center;justify-content:center;font-size:18px;
    flex:0 0 38px;
    box-shadow:0 0 0 2px var(--identity, transparent);
    transition:box-shadow 1s ease;
  }
  #header .meta{display:flex;flex-direction:column;line-height:1.15;min-width:0;}
  #header .name{font-size:16px;font-weight:600;color:var(--head-tx); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color 1s ease;}
  #header .sub{font-size:11.5px;color:var(--sub-tx); height:13px; transition:color 1s ease;}
  #header .sub.typing-sub{color:var(--accent);}
  #header .dots-r{margin-left:auto;color:var(--sub-tx);font-size:20px;letter-spacing:1px;}

  header.theme-match .ava{background:linear-gradient(135deg,#ff5a76,#b3236a);}
  header.theme-friend .ava{background:linear-gradient(135deg,#1f8a68,#125a45);}

  /* scene / weather layers */
  #scene{position:absolute; inset:34px 0 0 0; z-index:1; pointer-events:none; opacity:0; transition:opacity 1.2s ease;}
  #scene.on{opacity:1;}
  #scene .layer{position:absolute; inset:0; opacity:0; transition:opacity 1.4s ease;}
  #scene .layer.show{opacity:.4;}
  #scene .sc-road.show, #scene .sc-sea.show{opacity:.92;}
  .sc-rain{background:linear-gradient(180deg, rgba(20,28,45,.55), rgba(8,10,18,.5));}
  .sc-rain::after{
    content:""; position:absolute; inset:-20%;
    background-image:repeating-linear-gradient(102deg, rgba(150,170,210,.16) 0 1px, transparent 1px 9px);
    animation:rain .5s linear infinite; opacity:.5;
  }
  @keyframes rain{from{transform:translateY(-40px);}to{transform:translateY(40px);}}
  .sc-road{background:linear-gradient(180deg,#04050c 0%, #0a0c1a 55%, #06070f 100%);}
  .sc-road::after{content:""; position:absolute; left:0; right:0; bottom:0; height:66%;
    background:repeating-linear-gradient(to bottom, #e6c169 0 5%, transparent 5% 17%);
    clip-path:polygon(48.5% 0, 51.5% 0, 70% 100%, 30% 100%);
    animation:road .5s linear infinite;}
  @keyframes road{from{background-position:0 0;}to{background-position:0 120px;}}
  .sc-sea{background:linear-gradient(180deg,#04060e 0%, #08111f 50%, #0a1c2a 100%);}
  .sc-sea::after{content:""; position:absolute; inset:0;
    background:
      radial-gradient(1.6px 1.6px at 18% 15%, #fff, transparent 60%),
      radial-gradient(1.6px 1.6px at 63% 9%, #fff, transparent 60%),
      radial-gradient(1.6px 1.6px at 82% 20%, #dffbff, transparent 60%),
      radial-gradient(1.6px 1.6px at 39% 7%, #fff, transparent 60%),
      radial-gradient(1.6px 1.6px at 51% 23%, #fff, transparent 60%);}
  .sc-sea::before{content:""; position:absolute; left:0; right:0; bottom:0; height:44%;
    background:linear-gradient(180deg, transparent, rgba(120,170,200,.16));
    animation:sea 3.5s ease-in-out infinite;}
  @keyframes sea{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}

  /* doodles */
  #doodles{position:absolute; inset:34px 0 0 0; z-index:1; pointer-events:none; overflow:hidden;}
  .doodle{position:absolute; font-size:26px; opacity:0; filter:grayscale(.2); animation:floatUp linear forwards;}
  @keyframes floatUp{0%{opacity:0; transform:translateY(20px) rotate(0);}15%{opacity:.20;}100%{opacity:0; transform:translateY(-120px) rotate(18deg);}}

  /* messages */
  #thread{
    flex:1 1 auto; overflow-y:auto; overflow-x:hidden;
    padding:14px 14px 6px; z-index:3; position:relative;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }
  #thread::-webkit-scrollbar{display:none;}

  .divider{display:flex; justify-content:center; margin:14px 0 10px;}
  .divider span{background:var(--pill-bg); color:var(--pill-tx); font-size:11.5px; font-weight:600;
    padding:4px 12px; border-radius:20px; letter-spacing:.3px; transition:background .9s ease, color .9s ease;}

  .row{display:flex; margin:2px 0; animation:rise .26s cubic-bezier(.2,.8,.2,1);}
  .row.me{justify-content:flex-end;}
  .row.left{justify-content:flex-start;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);}to{opacity:1; transform:translateY(0);}}

  .bub{
    max-width:78%; padding:8px 12px; border-radius:19px; font-size:15.5px; line-height:1.32;
    word-wrap:break-word; white-space:pre-wrap; position:relative;
    box-shadow:0 1px 1px rgba(0,0,0,.12);
    transition:background .9s ease, color .9s ease;
  }
  .me .bub{background:var(--me-bg); color:var(--me-tx); border-bottom-right-radius:6px;}
  .left .bub{background:var(--him-bg); background:color-mix(in srgb, var(--him-bg) 72%, var(--identity, #80808000) 28%); color:var(--him-tx); border-bottom-left-radius:6px;}

  .pop{animation:pop .32s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{0%{transform:scale(.8); opacity:0;}60%{transform:scale(1.04);}100%{transform:scale(1); opacity:1;}}

  .stamp{font-size:10.5px; color:var(--stamp-tx); margin:1px 7px 5px; transition:color .9s ease; }
  .me .stamp{text-align:right;}
  body.act3 .stamp{color:#8a8a95; font-size:11px;}
  body.act3 .stamp.hot{color:#b06a6a;}

  /* typing indicator bubble */
  .typing .bub{display:inline-flex; gap:4px; align-items:center; padding:11px 14px;}
  .typing .d{width:7px;height:7px;border-radius:50%; background:#9a9aa4; opacity:.5; animation:blink 1.2s infinite;}
  .typing .d:nth-child(2){animation-delay:.2s;}
  .typing .d:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.3; transform:translateY(0);}30%{opacity:1; transform:translateY(-3px);}}
  body.act3 .typing .bub{animation:heartbeat 1s ease-in-out infinite;}
  @keyframes heartbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.12);}28%{transform:scale(1);}42%{transform:scale(1.08);}}

  /* input bar */
  #inputbar{
    flex:0 0 auto; z-index:5; position:relative;
    border-top:1px solid rgba(128,128,128,.18);
    background:var(--head-bg);
    padding:9px 12px calc(11px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:9px;
    transition:background 1s ease, border-color 1s ease;
  }
  #field{
    flex:1 1 auto; min-height:38px; max-height:96px; overflow:hidden;
    background:var(--input-bg); border-radius:20px; padding:9px 14px;
    font-size:15.5px; color:var(--input-tx); line-height:1.3;
    display:flex; align-items:center;
    position:relative;
    transition:background 1s ease, box-shadow 1s ease, color 1s ease;
  }
  #field .ph{color:var(--ph-tx);}
  #field .cur{display:inline-block; width:2px; height:18px; background:var(--accent); margin-left:1px; animation:caret 1s steps(1) infinite; vertical-align:middle;}
  @keyframes caret{50%{opacity:0;}}
  #send{
    flex:0 0 36px; width:36px;height:36px;border-radius:50%;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    transition:filter .6s, box-shadow .6s, background 1s ease;
  }
  #send svg{width:18px;height:18px;fill:#fff;}

  /* ---- bleeding state ---- */
  body.bleeding #send{box-shadow:0 0 16px 2px #b3121f, 0 0 4px #ff2a3a; filter:saturate(1.3);}
  body.bleeding #inputbar{background:#160a0c;}
  #field .blood-fill{position:absolute; inset:0; border-radius:20px;
    background:linear-gradient(90deg,var(--blood2),var(--blood1) 60%, transparent);
    width:0%; transition:width 2.6s ease; opacity:.92;}
  body.bleeding #field{box-shadow:inset 0 0 18px rgba(140,13,28,.5);}

  .tear{position:absolute; width:3px; border-radius:3px; top:0; height:0;
    background:linear-gradient(#b3121f,#5e0c16); z-index:30; pointer-events:none;
    box-shadow:0 0 6px #8c0d1c; opacity:.95;}
  .tear.run{animation:tear var(--td,2.4s) ease-in forwards;}
  @keyframes tear{0%{height:0;}100%{height:var(--th,200px);}}
  .tear .drop{position:absolute; bottom:-3px; left:-2px; width:7px;height:7px;border-radius:50%;
    background:#b3121f; box-shadow:0 0 6px #b3121f;}

  /* ghost / flicker overlay */
  #ghosts{position:absolute; inset:34px 0 0 0; z-index:4; pointer-events:none; overflow:hidden;}
  .ghost{position:absolute; left:50%; transform:translate(-50%,0);
    font-size:17.5px; color:#fff; opacity:0; white-space:normal; max-width:80%; text-align:center; line-height:1.35;
    padding:11px 18px; border-radius:16px; background:rgba(80,14,22,.55); box-shadow:0 0 26px rgba(0,0,0,.55);}
  .ghost.flick{animation:flick 1.7s ease forwards;}
  @keyframes flick{0%{opacity:0; transform:translate(-50%,10px);}16%{opacity:1; transform:translate(-50%,0);}82%{opacity:1; transform:translate(-50%,0);}100%{opacity:0; transform:translate(-50%,-10px);}}

  #crack{position:absolute; inset:0; z-index:9; opacity:0; pointer-events:none; transition:opacity 1.4s;}
  #crack.on{opacity:.85;}

  /* end card */
  #endcard{position:absolute; inset:0; z-index:12; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:22px; opacity:0; pointer-events:none;
    transition:opacity 1.4s ease; background:#040405;}
  #endcard.on{opacity:1; pointer-events:auto;}
  #endcard .note{color:#6a6a72; font-size:13px; letter-spacing:.4px;}
  #endcard h1{font-size:30px; font-weight:600; letter-spacing:1px; margin:0; color:#d8cde8; opacity:.9;}
  #endcard #replay{margin-top:6px; color:#7a7a84; font-size:13px;
    border:1px solid #2a2a30; padding:9px 22px; border-radius:22px; cursor:pointer; opacity:0; transition:opacity 1s;}
  #endcard.show-replay #replay{opacity:1;}

  /* start overlay */
  #start{position:absolute; inset:0; z-index:20; background:radial-gradient(120% 90% at 50% 30%, #1a1426, #060608 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer;
    transition:opacity .8s ease;}
  #start h1{font-size:34px; font-weight:600; letter-spacing:1px; margin:0; color:#efe7fb;}
  #start .sub{color:#8a7ea0; font-size:13px; letter-spacing:3px; text-transform:uppercase;}
  #start .go{margin-top:26px; color:#b9a9d8; font-size:13px; border:1px solid #3a2f4e; padding:10px 24px; border-radius:24px; animation:pulseGo 2s infinite;}
  @keyframes pulseGo{0%,100%{opacity:.6;}50%{opacity:1;}}
  #start.hide{opacity:0; pointer-events:none;}

  body.act3 #thread{animation:glitchY 7s infinite;}
  @keyframes glitchY{0%,97%,100%{transform:translateX(0);}97.5%{transform:translateX(1px);}98.5%{transform:translateX(-1px);}}

  .vignette{position:absolute; inset:0; z-index:10; pointer-events:none;
    box-shadow:inset 0 0 120px rgba(0,0,0,.28);}
  body.bleeding .vignette{box-shadow:inset 0 0 130px rgba(90,8,16,.5), inset 0 0 60px rgba(0,0,0,.6);}
</style>
</head>
<body>
  <div id="phone">
    <div id="statusbar">
      <span id="clock">22:47</span>
      <span class="right">
        <span style="font-size:12px;">5G</span>
        <span class="bat"><i></i></span>
      </span>
    </div>

    <div id="header" class="theme-match">
      <div class="back">‹</div>
      <div class="ava">🔥</div>
      <div class="meta">
        <span class="name">new match</span>
        <span class="sub" id="hsub"></span>
      </div>
      <div class="dots-r">⋯</div>
    </div>

    <div id="scene">
      <div class="layer sc-rain" data-sc="rain"></div>
      <div class="layer sc-road" data-sc="road"></div>
      <div class="layer sc-sea" data-sc="sea"></div>
    </div>
    <div id="doodles"></div>

    <div id="thread"></div>

    <div id="ghosts"></div>
    <svg id="crack" viewBox="0 0 420 880" preserveAspectRatio="none">
      <g stroke="#b3121f" stroke-width="1.4" fill="none" opacity="0.9" filter="drop-shadow(0 0 2px #8c0d1c)">
        <path d="M210 470 L198 510 L214 548 L196 600 L220 660 L205 720 L226 800"/>
        <path d="M210 470 L240 500 L228 540 L262 580 L250 640"/>
        <path d="M210 470 L182 498 L160 470 L120 500 L96 470"/>
        <path d="M198 510 L150 520 L120 552"/>
        <path d="M214 548 L268 542 L300 560"/>
        <path d="M210 470 L214 430 L196 392 L214 350"/>
      </g>
    </svg>

    <div class="vignette"></div>

    <div id="inputbar">
      <div id="field"><span class="ph">Message</span><span class="blood-fill"></span></div>
      <div id="send"><svg viewBox="0 0 24 24"><path d="M3 11.5 21 3l-8.5 18-2.2-7.3z"/></svg></div>
    </div>

    <div id="endcard">
      <div class="note">you deleted this conversation</div>
      <h1>three reasons</h1>
      <div id="replay">play again</div>
    </div>

    <div id="start">
      <h1>three reasons</h1>
      <div class="sub">one week</div>
      <div class="go">tap to begin</div>
    </div>
  </div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const thread = $('#thread'), field = $('#field'), clock = $('#clock'),
      header = $('#header'), hname = header.querySelector('.name'),
      hsub = $('#hsub'), hava = header.querySelector('.ava'),
      doodles = $('#doodles'), sceneWrap = $('#scene');

let paused = false, dead = false;
const sleep = ms => new Promise(r=>setTimeout(r,ms));
async function wait(ms){
  const end = Date.now()+ms;
  while(Date.now()<end){ if(dead) throw 'dead'; await sleep(Math.min(60,end-Date.now())); while(paused){ await sleep(80);} }
}
const scrollDown = ()=>{ thread.scrollTop = thread.scrollHeight; };

/* ---------- builders ---------- */
const S = [];
let floodGap = 300;
const me   = (text,o={}) => S.push({type:'me', text, ...o});
const him  = (text,o={}) => S.push({type:'left', who:'him', text, ...o});

function rowEl(cls){ const r=document.createElement('div'); r.className='row '+cls; return r; }

function setHeader(name,theme,sub,ava){
  header.className = theme||'';
  hname.textContent = name;
  hsub.textContent = sub||'';
  hava.textContent = ava||'👤';
  const phone=document.getElementById('phone');
  phone.classList.remove('who-him','who-friend');
  phone.classList.add(theme==='theme-friend'?'who-friend':'who-him');
}

function addBubble(side, text, {stamp, cls='', tiny=false, glitch=false, bg=null, tx=null}={}){
  const row = rowEl(side+(cls?' '+cls:''));
  const b = document.createElement('div'); b.className='bub pop';
  if(tiny){ b.style.fontSize='13px'; b.style.opacity='.85'; }
  if(bg){ b.style.background=bg; }
  if(tx){ b.style.color=tx; }
  b.textContent = text;
  if(glitch) b.dataset.glitch='1';
  row.appendChild(b);
  thread.appendChild(row);
  if(stamp){
    const s=document.createElement('div'); s.className='stamp'+(document.body.classList.contains('act3')?' hot':'');
    s.textContent=stamp;
    const wrap=document.createElement('div'); wrap.style.width='100%'; wrap.style.display='flex';
    wrap.style.justifyContent = side==='me'?'flex-end':'flex-start';
    wrap.appendChild(s); thread.appendChild(wrap);
  }
  scrollDown();
  return row;
}

async function typeInField(text){
  field.innerHTML='<span class="t"></span><span class="cur"></span><span class="blood-fill"></span>';
  const t=field.querySelector('.t');
  for(let i=0;i<text.length;i++){
    if(dead) throw 'dead'; while(paused) await sleep(80);
    t.textContent += text[i];
    await sleep(48 + Math.random()*52 + (/[.,?]/.test(text[i])?190:0));
  }
}
async function deleteField(){
  const t=field.querySelector('.t'); if(!t) return;
  while(t.textContent.length){
    if(dead) throw 'dead'; while(paused) await sleep(80);
    t.textContent = t.textContent.slice(0,-1);
    await sleep(28 + Math.random()*24);
  }
  resetField();
}
function resetField(){ field.innerHTML='<span class="ph">Message</span><span class="blood-fill"></span>'; }

async function showTyping(ms, who){
  const cls = who==='friend'?'friend':'';
  const row=rowEl('left typing'+(cls?' '+cls:''));
  const b=document.createElement('div'); b.className='bub';
  b.innerHTML='<span class="d"></span><span class="d"></span><span class="d"></span>';
  row.appendChild(b); thread.appendChild(row); scrollDown();
  hsub.textContent='typing…'; hsub.classList.add('typing-sub');
  await wait(ms);
  row.remove();
  hsub.classList.remove('typing-sub'); hsub.textContent='online';
}

function spawnDoodles(list){
  list.forEach((emo,i)=>{
    setTimeout(()=>{
      const d=document.createElement('div'); d.className='doodle'; d.textContent=emo;
      d.style.left=(8+Math.random()*84)+'%';
      d.style.bottom='-6%';
      d.style.animationDuration=(3.2+Math.random()*2.2)+'s';
      doodles.appendChild(d);
      setTimeout(()=>d.remove(),6000);
    }, i*180);
  });
}

function setScene(name){
  document.querySelectorAll('#scene .layer').forEach(l=>l.classList.remove('show'));
  if(name && name!=='none'){
    sceneWrap.classList.add('on');
    const l=document.querySelector('.layer[data-sc="'+name+'"]');
    if(l) l.classList.add('show');
  } else sceneWrap.classList.remove('on');
}

async function timeJump(times){
  for(const t of times){
    clock.textContent = t;
    await wait(document.body.classList.contains('act3')?780:560);
  }
}

async function flashFragments(list){
  thread.style.transition='filter .3s'; thread.style.filter='blur(1.8px)';
  for(let k=0;k<list.length;k++){
    const row=rowEl(Math.random()<.5?'me':'left');
    const b=document.createElement('div'); b.className='bub'; b.style.opacity='.55';
    b.textContent=list[k]; row.appendChild(b); thread.appendChild(row); scrollDown();
    await wait(80);
  }
  await wait(240);
}

function clearThread(){ thread.innerHTML=''; thread.style.filter='none'; document.getElementById('phone').style.background=''; resetField(); setScene('none'); }

async function step(s){
  switch(s.type){
    case 'header': setHeader(s.name,s.theme,s.sub,s.ava); await wait(500); break;
    case 'divider':{
      const d=document.createElement('div'); d.className='divider';
      d.innerHTML='<span>'+s.label+'</span>'; thread.appendChild(d); scrollDown();
      await wait(500); break;
    }
    case 'me':{
      if(s.live && !s.instant){ await typeInField(s.text); await wait(320); resetField(); }
      addBubble('me', s.text, {stamp:s.t, tiny:s.tiny, bg:s.bg, tx:s.tx});
      try{ navigator.vibrate && navigator.vibrate(8);}catch(e){}
      await wait(s.gap!=null?s.gap:(s.instant?230:640));
      break;
    }
    case 'left':{
      const cls = s.who==='friend'?'friend':'';
      if(!s.instant){ await showTyping(Math.min(2400, 640 + s.text.length*22), s.who); }
      addBubble('left', s.text, {stamp:s.t, cls, glitch:s.glitch, bg:s.bg, tx:s.tx});
      try{ navigator.vibrate && navigator.vibrate(14);}catch(e){}
      await wait(s.gap!=null?s.gap:(s.instant?230:800));
      break;
    }
    case 'typing': await showTyping(s.ms, s.who); break;
    case 'pause': await wait(s.ms); break;
    case 'draft': await typeInField(s.text); await wait(s.hold||900); await deleteField(); await wait(480); break;
    case 'clear': await wait(300); clearThread(); await wait(350); break;
    case 'scene': setScene(s.name); await wait(400); break;
    case 'act':
      if(s.n===3){ document.body.classList.add('act3'); document.body.classList.add('dying'); }
      break;
    case 'timejump': await timeJump(s.times); break;
    case 'fragments': await flashFragments(s.list); break;
    case 'blur': thread.style.transition='filter .7s ease'; thread.style.filter = s.amount? ('blur('+s.amount+'px)') : 'none'; await wait(s.ms||0); break;
    case 'palette':{ [...document.body.classList].forEach(c=>{ if(c.indexOf('pal-')===0) document.body.classList.remove(c); }); if(s.name) document.body.classList.add('pal-'+s.name); await wait(s.ms||0); break; }
    case 'bg':{ const ph=document.getElementById('phone'); ph.style.transition='background .9s ease'; ph.style.background=s.color||''; await wait(s.ms||0); break; }
    case 'doodle': spawnDoodles(s.list); break;
    case 'finale': await finale(); break;
  }
}

async function run(){
  try{ for(const s of S){ if(dead) return; await step(s); } }
  catch(e){ if(e!=='dead') console.error(e); }
}

function bleedFrom(elem, len){
  if(!elem) return;
  const r=elem.getBoundingClientRect(), p=$('#phone').getBoundingClientRect();
  const t=document.createElement('div'); t.className='tear run';
  t.style.left=(r.left-p.left + r.width/2)+'px';
  t.style.top=(r.top-p.top + r.height-2)+'px';
  t.style.setProperty('--th',(len||140)+'px');
  t.style.setProperty('--td',(2.2+Math.random()*1.2)+'s');
  t.innerHTML='<span class="drop"></span>';
  $('#phone').appendChild(t);
}

async function deleteDialogue(){
  const kids=[...thread.children].reverse();
  for(const k of kids){
    if(dead) return;
    k.style.transition='opacity .26s ease, transform .26s ease, filter .26s ease';
    k.style.opacity='0'; k.style.transform='translateX(-14px)'; k.style.filter='blur(1px)';
    await wait(55);
    k.remove();
  }
}

  document.getElementById('phone').style.background='';

    "youd never once be bored of me",
    "a group of flamingos is called a flamboyance",

    "ill be the wet disaster by the door",

    "im going to end up with a real crush on you",

  ];

  await wait(2200);
  end.classList.add('show-replay');
}

$('#start').addEventListener('click', function once(){

  try{ navigator.vibrate && navigator.vibrate(20);}catch(e){}
  setTimeout(run, 700);
  $('#start').removeEventListener('click', once);
}, {once:true});

$('#replay').addEventListener('click', ()=>location.reload());
